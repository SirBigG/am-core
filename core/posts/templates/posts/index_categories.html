{% load post_extras %}
{% for root in roots %}
    <section class="site-category-section">
        <h2 class="site-category-section__title">{{ root.value }}</h2>
        <div class="row">
            {% for child in root.get_children %}
                <div class="col-lg-3 col-6 mb-2">
                    <article class="site-category-card">
                        <a class="site-category-card__media"
                           href="{% url 'parent-category-index' parent=child.slug %}">
                            {% if child.image %}
                                <img src="{{ child.image.url }}"
                                     class="site-category-card__image"
                                     alt="{{ child.value }}"
                                     width="320"
                                     height="240">
                            {% endif %}
                            <h3 class="site-category-card__title">{{ child.value }}</h3>
                        </a>
                        <div class="site-category-card__links">
                            <ul class="site-link-grid site-link-grid--compact">
                                {% for ch in child.get_children %}
                                    <li class="site-link-grid__item">
                                        <a class="site-link-grid__link"
                                           href="{% url 'posts-list-view' parent=child.slug child=ch.slug %}">{{ ch.value }}</a>
                                    </li>
                                {% endfor %}
                            </ul>
                        </div>
                    </article>
                </div>
            {% endfor %}
        </div>
    </section>
{% endfor %}
