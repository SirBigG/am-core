<nav class="site-breadcrumbs" aria-label="breadcrumb">
    <ol class="breadcrumb site-breadcrumbs__list">
        <li class="breadcrumb-item site-breadcrumbs__item">
            <a class="site-breadcrumbs__link site-breadcrumbs__home"
               href="{% url 'registry:index' %}"
               aria-label="Реєстр">
                <i class="icon-home" aria-hidden="true"></i>
            </a>
        </li>
        {% for item in items %}
            {% if forloop.last %}
                <li class="breadcrumb-item site-breadcrumbs__item active"
                    aria-current="page">{{ item.title }}</li>
            {% else %}
                <li class="breadcrumb-item site-breadcrumbs__item">
                    <a class="site-breadcrumbs__link" href="{{ item.absolute_url }}">{{ item.title }}</a>
                </li>
            {% endif %}
        {% endfor %}
    </ol>
</nav>
